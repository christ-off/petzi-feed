name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-west-3
  FUNCTION_NAME: petzi-feed
  S3_BUCKET: my-petzi-feed
  FEEDS_CONFIG: '[{"organiserUrl":"https://www.petzi.ch/fr/organiser/143/","s3Key":"feeds/pont-rouge-atom.xml"}]'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Test with coverage
        run: npm run test:coverage

      - name: SonarCloud analysis
        uses: sonarsource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install production dependencies
        run: npm ci --omit=dev --ignore-scripts

      - name: Configure Lambda environment
        run: |
          export FUNCTION_NAME="${{ env.FUNCTION_NAME }}"
          export S3_BUCKET="${{ env.S3_BUCKET }}"
          export FEEDS_CONFIG="${{ env.FEEDS_CONFIG }}"
          aws lambda update-function-configuration \
            --function-name "$FUNCTION_NAME" \
            --environment "Variables={S3_BUCKET=\"$S3_BUCKET\",FEEDS_CONFIG=\"$FEEDS_CONFIG\"}"

      - name: Build deployment package
        run: |
          zip -r function.zip src/ node_modules/ package.json -x "*.DS_Store"

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.FUNCTION_NAME }} \
            --zip-file fileb://function.zip
