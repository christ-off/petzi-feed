name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-west-3
  FUNCTION_NAME: petzi-feed
  S3_BUCKET: my-petzi-feed
  FEEDS_CONFIG: '[{"organiserUrl":"https://www.petzi.ch/fr/organiser/143/","s3Key":"feeds/pont-rouge-atom.xml"}]'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Test with coverage
        run: npm run test:coverage

      - name: SonarCloud analysis
        uses: sonarsource/sonarcloud-github-action@383f7e52eae3ab0510c3cb0e7d9d150bbaeab838 # v3.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/petzi-feed-lambda-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Install production dependencies
        run: npm ci --omit=dev --ignore-scripts

      - name: Configure Lambda environment
        run: |
          aws lambda update-function-configuration \
            --function-name ${{ env.FUNCTION_NAME }} \
            --environment "Variables={S3_BUCKET=${{ env.S3_BUCKET }},FEEDS_CONFIG=${{ env.FEEDS_CONFIG }}}"

      - name: Build deployment package
        run: |
          zip -r function.zip src/ node_modules/ package.json -x "*.DS_Store"

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.FUNCTION_NAME }} \
            --zip-file fileb://function.zip
